<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#d9c4a3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="くまさん叩き">
<title>つくる手帖 くまさん叩き in 秋田市</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
:root{--paper:#f8f1e4;--ink:#3f3428;--muted:#7a6a58;--brown:#9b6b43;--brown2:#6f472d;--line:#d7c4a8;--sky:#bfe4f4;--grass:#9bc37b;--accent:#d56b3f;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#4b4035;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;touch-action:none;user-select:none}body{position:fixed;inset:0;height:100vh;height:100svh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}#app{width:min(100vw,480px);height:100dvh;max-height:860px;background:var(--paper);position:relative;overflow:hidden;border-left:1px solid rgba(255,255,255,.2);border-right:1px solid rgba(255,255,255,.2);box-shadow:0 14px 44px rgba(0,0,0,.35)}.screen{position:absolute;inset:0;display:none}.screen.show{display:flex}.titleScreen,.resultScreen{padding:22px 20px;flex-direction:column;background:linear-gradient(#fbf6ea,#f2e5cf)}.grid:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(90,70,45,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(90,70,45,.06) 1px,transparent 1px);background-size:18px 18px;pointer-events:none}.logo{position:relative;text-align:center;margin:18px 0 12px}.logo .small{font-weight:700;letter-spacing:.15em;font-size:18px}.logo h1{margin:6px 0 4px;font-size:40px;line-height:1.08;letter-spacing:.04em}.logo .place{font-size:22px;font-weight:800}.heroBear{width:92px;height:110px;margin:6px auto 12px;position:relative}.bearBody{position:absolute;left:13px;top:25px;width:66px;height:78px;background:#b9804e;border:3px solid #6f472d;border-radius:44% 44% 42% 42%}.ear{position:absolute;width:28px;height:28px;background:#b9804e;border:3px solid #6f472d;border-radius:50%;top:12px}.ear.l{left:12px}.ear.r{right:12px}.face{position:absolute;left:26px;top:43px;width:40px;height:34px;background:#f4ddbd;border-radius:50%;border:2px solid #6f472d}.eye{position:absolute;top:9px;width:5px;height:5px;background:#332;border-radius:50%}.eye.l{left:10px}.eye.r{right:10px}.nose{position:absolute;left:17px;top:15px;width:7px;height:5px;background:#332;border-radius:50%}.mouth{position:absolute;left:13px;top:21px;font-size:10px}.hammerMini{position:absolute;right:-8px;bottom:8px;transform:rotate(-25deg);font-size:38px}.intro{position:relative;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.75;font-weight:650}.infoGrid{position:relative;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0}.infoBox{background:#fff9ee;border:1px solid var(--line);border-radius:12px;text-align:center;padding:10px 4px;font-size:13px;font-weight:800}.bigBtn,.subBtn{position:relative;border:0;border-radius:18px;background:var(--brown);color:#fff;font-size:24px;font-weight:900;padding:18px 16px;box-shadow:0 5px 0 var(--brown2);margin-top:auto}.subRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.subBtn{background:#fff8ec;color:var(--ink);font-size:16px;box-shadow:0 3px 0 #c8aa83;border:1px solid #c8aa83;padding:13px}.cityLine{position:relative;margin-top:18px;height:70px;opacity:.75}.cityLine svg{width:100%;height:100%}.gameScreen{flex-direction:column;background:#e6d6b9}.hud{height:74px;background:#f8f1e4;border-bottom:2px solid #cdb58f;display:grid;grid-template-columns:72px 1fr 1fr;align-items:center;padding:8px 12px;gap:8px}.pause{width:46px;height:46px;border-radius:13px;border:2px solid #af8e62;background:#fff8ec;font-size:22px;font-weight:900}.metric{text-align:center}.metric .label{font-size:12px;letter-spacing:.12em;font-weight:900;color:#6f5b44}.metric .value{font-size:32px;font-weight:950;line-height:1;color:#4d3929}.metric.score .value{color:var(--accent)}#boardWrap{position:relative;flex:1;min-height:0;padding:10px;background:linear-gradient(#bfe4f4 0 34%,#e5d2a8 34%)}#game{position:absolute;inset:10px;width:calc(100% - 20px);height:calc(100% - 20px);border:3px solid #8b6a46;border-radius:18px;background:#d9c29a;box-shadow:inset 0 0 0 4px rgba(255,255,255,.25)}.placeCard{height:66px;background:#f8f1e4;border-top:2px solid #cdb58f;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;line-height:1.5;padding:8px 14px}.placeCard small{display:block;color:var(--muted);font-weight:700}.overlay{position:absolute;inset:0;display:none;background:rgba(41,34,28,.42);align-items:center;justify-content:center;padding:18px}.overlay.show{display:flex}.panel{width:min(92%,360px);background:#fff8ec;border:2px solid #c9aa7f;border-radius:22px;padding:22px;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.25)}.panel h2{margin:0 0 10px;font-size:28px}.panel p{line-height:1.65;font-weight:700}.resultScreen{align-items:center;justify-content:center}.resultCard{position:relative;width:100%;max-width:380px;background:#fff8ec;border:2px solid #c9aa7f;border-radius:24px;padding:26px 20px;text-align:center;box-shadow:0 14px 38px rgba(0,0,0,.18)}.resultCard h2{font-size:30px;margin:0 0 18px}.finalScore{font-size:56px;color:var(--accent);font-weight:950}.stamp{display:inline-block;margin:10px 0 8px;border:3px solid #d4432f;color:#d4432f;transform:rotate(-8deg);font-weight:950;padding:6px 12px;font-size:20px;background:#fff}.resultBtns{display:grid;gap:12px;margin-top:16px}.resultBtns button,.resultBtns a{display:block;text-decoration:none;border-radius:15px;border:1px solid #c9aa7f;background:var(--brown);color:#fff;padding:14px;font-weight:900;font-size:17px}.resultBtns a{background:#fff8ec;color:var(--ink)}@media(max-height:700px){.logo{margin-top:4px}.logo h1{font-size:34px}.intro{font-size:14px;padding:10px}.infoGrid{margin:10px 0}.cityLine{display:none}.bigBtn{padding:15px}.heroBear{transform:scale(.86);margin:0 auto}}
</style>
</head>
<body>
<div id="app">
  <section id="title" class="screen titleScreen grid show">
    <div class="logo"><div class="small">つくる手帖</div><h1>くまさん叩き</h1><div class="place">in 秋田市</div></div>
    <div class="heroBear" aria-hidden="true"><div class="ear l"></div><div class="ear r"></div><div class="bearBody"></div><div class="face"><span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">⌣</span></div><div class="hammerMini">🔨</div></div>
    <div class="intro">秋田市市街地に、くまさんたちがひょっこり。<br>穴から出てきたくまさんを、制限時間内にたくさんタッチしてください。</div>
    <div class="infoGrid"><div class="infoBox">📍 秋田市市街地</div><div class="infoBox">⏱ 60秒</div><div class="infoBox">🏆 ベスト保存</div></div>
    <button id="startBtn" class="bigBtn">ゲームスタート 🐾</button>
    <div class="subRow"><button id="howBtn" class="subBtn">遊び方</button><button id="resetBestBtn" class="subBtn">記録リセット</button></div>
    <div class="cityLine"><svg viewBox="0 0 420 80"><path d="M0 65h420" stroke="#6f5b44" stroke-width="3"/><path d="M18 65V42h22v23M55 65V30h36v35M112 65V20h8v45M103 31h26M170 65V35h46v30M235 65V48h34v17M290 65V30l42-18 42 18v35M305 65V38h54v27" fill="none" stroke="#6f5b44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </section>
  <section id="gameScreen" class="screen gameScreen">
    <div class="hud"><button id="pauseBtn" class="pause">Ⅱ</button><div class="metric"><div class="label">TIME</div><div id="timeVal" class="value">60</div></div><div class="metric score"><div class="label">SCORE</div><div id="scoreVal" class="value">0</div></div></div>
    <div id="boardWrap"><canvas id="game" width="420" height="560"></canvas></div>
    <div class="placeCard">秋田市市街地<small>秋田駅周辺・千秋公園・竿燈大通りをイメージ</small></div>
    <div id="pauseOverlay" class="overlay"><div class="panel"><h2>一時停止</h2><p>もう一度ボタンを押すと再開します。</p><button id="resumeBtn" class="subBtn">再開する</button></div></div>
  </section>
  <section id="result" class="screen resultScreen grid"><div class="resultCard"><h2>ゲーム終了 🐾</h2><div>あなたのスコア</div><div><span id="finalScore" class="finalScore">0</span> 点</div><div id="newRecord" class="stamp" style="display:none">新記録！</div><p>ベストスコア：<b id="bestScore">0</b> 点</p><div class="resultBtns"><button id="againBtn">もう一度遊ぶ</button><a id="backToTecho" href="https://tad551216-rgb.github.io/tsukuru-techo/">← つくる手帖へ戻る</a></div></div></section>
</div>
<script>
(()=>{'use strict';
const CACHE_VERSION='tt-kuma-tap-v1';
if('serviceWorker'in navigator){addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
document.addEventListener('gesturestart',e=>e.preventDefault());document.addEventListener('gesturechange',e=>e.preventDefault());document.addEventListener('dblclick',e=>e.preventDefault());
const $=id=>document.getElementById(id);const title=$('title'),gameScreen=$('gameScreen'),result=$('result'),cv=$('game'),ctx=cv.getContext('2d');
const W=420,H=560;let dpr=1,score=0,timeLeft=60,running=false,paused=false,last=0,spawnTimer=0,hitFx=[];const holes=[];const bears=[];const bestKey='tt_kuma_tap_best_v1';
function show(s){[title,gameScreen,result].forEach(x=>x.classList.remove('show'));s.classList.add('show')}
function fit(){dpr=Math.min(devicePixelRatio||1,2.5);cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)} fit(); addEventListener('resize',fit);
function initHoles(){holes.length=0;const xs=[100,210,320],ys=[230,340,450];for(const y of ys)for(const x of xs)holes.push({x,y,r:43});}
function reset(){score=0;timeLeft=60;spawnTimer=0;bears.length=0;hitFx.length=0;initHoles();$('scoreVal').textContent=score;$('timeVal').textContent=timeLeft;paused=false;running=true;last=performance.now();show(gameScreen);requestAnimationFrame(loop)}
function spawn(){const free=holes.filter((h,i)=>!bears.some(b=>b.hole===i));if(!free.length)return;const h=free[(Math.random()*free.length)|0];const idx=holes.indexOf(h);bears.push({hole:idx,x:h.x,y:h.y,t:0,life:950+Math.random()*700,phase:'up',hit:false,kind:Math.random()<.12?'gold':'normal'});}
function loop(now){if(!running)return;let dt=now-last;last=now;if(dt>60)dt=60;if(!paused){timeLeft-=dt/1000;if(timeLeft<=0){timeLeft=0;end();return}$('timeVal').textContent=Math.ceil(timeLeft);spawnTimer-=dt;if(spawnTimer<=0){spawn();spawnTimer=360+Math.random()*420}for(let i=bears.length-1;i>=0;i--){const b=bears[i];b.t+=dt;if(b.t>b.life)bears.splice(i,1)}for(let i=hitFx.length-1;i>=0;i--){hitFx[i].t+=dt;if(hitFx[i].t>550)hitFx.splice(i,1)}}draw();requestAnimationFrame(loop)}
function draw(){ctx.clearRect(0,0,W,H);drawBg();holes.forEach(drawHole);bears.forEach(drawBear);hitFx.forEach(drawFx)}
function drawBg(){ctx.fillStyle='#bfe4f4';ctx.fillRect(0,0,W,170);ctx.fillStyle='#e6d0a4';ctx.fillRect(0,170,W,H-170);ctx.fillStyle='#fff';cloud(55,55,30);cloud(345,48,24);ctx.strokeStyle='#75614d';ctx.lineWidth=3;ctx.fillStyle='#e6e0d0';ctx.fillRect(42,115,48,55);ctx.strokeRect(42,115,48,55);ctx.fillRect(105,95,68,75);ctx.strokeRect(105,95,68,75);ctx.fillStyle='#a9412f';ctx.beginPath();ctx.moveTo(220,170);ctx.lineTo(245,48);ctx.lineTo(270,170);ctx.stroke();for(let y=65;y<165;y+=20){ctx.beginPath();ctx.moveTo(235,y);ctx.lineTo(255,y);ctx.stroke()}ctx.fillStyle='#6f5134';ctx.beginPath();ctx.moveTo(287,170);ctx.lineTo(340,118);ctx.lineTo(393,170);ctx.closePath();ctx.fill();ctx.fillStyle='#c99a5b';ctx.fillRect(304,142,72,28);ctx.strokeRect(304,142,72,28);ctx.fillStyle='#9bc37b';for(let i=0;i<55;i++){ctx.fillRect(Math.random()*W,175+Math.random()*370,2,7)}}
function cloud(x,y,s){ctx.beginPath();ctx.arc(x,y,s*.45,0,7);ctx.arc(x+s*.35,y-5,s*.35,0,7);ctx.arc(x+s*.7,y,s*.4,0,7);ctx.fill()}
function drawHole(h){ctx.save();ctx.fillStyle='rgba(70,42,20,.28)';ctx.beginPath();ctx.ellipse(h.x,h.y+9,h.r*1.08,h.r*.45,0,0,7);ctx.fill();ctx.fillStyle='#5a351d';ctx.beginPath();ctx.ellipse(h.x,h.y,h.r,h.r*.42,0,0,7);ctx.fill();ctx.restore()}
function drawBear(b){const h=holes[b.hole],p=Math.min(1,b.t/180),out=b.t>b.life-220?Math.max(0,(b.life-b.t)/220):p;const y=h.y+35-(54*out);ctx.save();ctx.beginPath();ctx.rect(h.x-45,h.y-70,90,70);ctx.clip();ctx.fillStyle=b.kind==='gold'?'#d8a82e':'#b9804e';ctx.strokeStyle='#6f472d';ctx.lineWidth=3;ctx.beginPath();ctx.arc(h.x-24,y-18,14,0,7);ctx.arc(h.x+24,y-18,14,0,7);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(h.x,y,34,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#f4ddbd';ctx.beginPath();ctx.ellipse(h.x,y+8,21,17,0,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#2f261f';ctx.beginPath();ctx.arc(h.x-10,y,3,0,7);ctx.arc(h.x+10,y,3,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(h.x,y+8,5,4,0,0,7);ctx.fill();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('⌣',h.x,y+23);ctx.restore()}
function drawFx(f){const a=1-f.t/550;ctx.save();ctx.globalAlpha=a;ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.fillStyle=f.gold?'#d8a82e':'#d56b3f';ctx.fillText(f.txt,f.x,f.y-f.t*.06);ctx.restore()}
function pointer(e){e.preventDefault();const r=cv.getBoundingClientRect();const p=e.touches?e.touches[0]:e;const x=(p.clientX-r.left)*W/r.width,y=(p.clientY-r.top)*H/r.height;hit(x,y)}
function hit(x,y){if(!running||paused)return;for(let i=bears.length-1;i>=0;i--){const b=bears[i],h=holes[b.hole];if(Math.hypot(x-h.x,y-(h.y-25))<48){const add=b.kind==='gold'?3:1;score+=add;$('scoreVal').textContent=score;hitFx.push({x:h.x,y:h.y-60,t:0,txt:'+'+add,gold:b.kind==='gold'});bears.splice(i,1);navigator.vibrate&&navigator.vibrate(25);break}}}
function end(){running=false;show(result);$('finalScore').textContent=score;const old=Number(localStorage.getItem(bestKey)||0);const isNew=score>old;if(isNew)localStorage.setItem(bestKey,String(score));$('bestScore').textContent=Math.max(score,old);$('newRecord').style.display=isNew?'inline-block':'none'}
cv.addEventListener('pointerdown',pointer,{passive:false});cv.addEventListener('touchstart',pointer,{passive:false});$('startBtn').onclick=reset;$('againBtn').onclick=reset;$('howBtn').onclick=()=>alert('穴から出てきたくまさんをタッチします。金色のくまさんは3点。60秒で高得点を目指してください。');$('resetBestBtn').onclick=()=>{localStorage.removeItem(bestKey);alert('ベストスコアをリセットしました。')};$('pauseBtn').onclick=()=>{paused=!paused;$('pauseOverlay').classList.toggle('show',paused);$('pauseBtn').textContent=paused?'▶':'Ⅱ';last=performance.now()};$('resumeBtn').onclick=()=>$('pauseBtn').click();
})();
</script>
</body>
</html>
