<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#efe5d2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="くまさん叩き">
<title>つくる手帖 くまさん叩き in 秋田市</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
:root{--paper:#fff9ec;--ink:#4b2f1c;--line:#d7c3a4;--green:#5f9645;--red:#d45235;--shadow:rgba(50,30,10,.22)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#e9dcc7;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;touch-action:none}
body{position:fixed;inset:0;height:100vh;height:100svh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
#app{position:relative;width:min(100vw,460px);height:100%;max-height:860px;background:linear-gradient(#fffaf0,#ead9bd);overflow:hidden;border-left:1px solid #d6c4a5;border-right:1px solid #d6c4a5}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.panel{position:absolute;left:14px;right:14px;background:rgba(255,249,236,.94);border:1.5px solid var(--line);border-radius:20px;box-shadow:0 10px 24px var(--shadow);padding:16px;z-index:4}
.top{top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-radius:18px}
.title{font-weight:900;line-height:1.05;font-size:22px;letter-spacing:.02em}.title small{display:block;font-size:13px;font-weight:800;margin-top:4px;opacity:.82}.stat{display:flex;gap:8px}.pill{min-width:76px;text-align:center;background:#fffdf7;border:1px solid #e1cfb4;border-radius:14px;padding:7px 8px;font-weight:900}.pill span{display:block;font-size:12px;opacity:.78}.pill b{font-size:24px}.pause{width:48px;height:48px;border:0;border-radius:15px;background:#8b623d;color:#fff;font-size:22px;font-weight:900;box-shadow:0 4px 0 #5d3d23}
.start,.over,.pauseBox{top:50%;transform:translateY(-50%);text-align:center}.start h1,.over h2,.pauseBox h2{margin:0 0 10px;font-size:34px;line-height:1.12}.start .sub{font-weight:800;font-size:18px;margin:6px 0 14px}.lead{line-height:1.75;text-align:left;background:#fffdf7;border:1px solid #eadcc4;border-radius:14px;padding:12px;margin:10px 0}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.card{background:#fffdf7;border:1px solid #e4d1b4;border-radius:14px;padding:9px 6px;font-size:12px;font-weight:800}.bigbtn,.subbtn{width:100%;border:0;border-radius:16px;padding:16px 14px;font-size:22px;font-weight:900;margin-top:10px;box-shadow:0 5px 0 rgba(78,49,25,.35)}.bigbtn{background:var(--green);color:white}.subbtn{background:#fffdf7;color:var(--ink);border:1px solid #d8c3a2;font-size:17px;padding:13px}.disabled{opacity:.48;pointer-events:none}.hide{display:none!important}.hint{position:absolute;left:18px;right:18px;bottom:18px;z-index:3;background:rgba(255,249,236,.92);border:1px solid #e0cdae;border-radius:18px;padding:10px 14px;font-weight:800;line-height:1.45;box-shadow:0 5px 15px var(--shadow)}.scoreBig{font-size:62px;font-weight:900;color:var(--red);line-height:1}.stamp{display:inline-block;transform:rotate(-8deg);border:4px solid var(--red);color:var(--red);padding:4px 10px;border-radius:8px;font-weight:900;margin:8px}.spots{font-size:12px;opacity:.82;margin-top:6px}@media(max-height:680px){.start h1{font-size:28px}.lead{font-size:14px;line-height:1.55}.cards{display:none}.top{top:8px}.hint{font-size:13px;bottom:10px}.title small{display:none}}
</style>
</head>
<body>
<div id="app">
<canvas id="cv" width="420" height="760" aria-label="くまさん叩きゲーム"></canvas>
<div class="panel top">
  <div class="title">くまさん叩き <small>in 秋田市市街地</small></div>
  <div class="stat"><div class="pill"><span>残り</span><b id="time">45</b></div><div class="pill"><span>スコア</span><b id="score">0</b></div></div>
  <button id="pause" class="pause" aria-label="一時停止">Ⅱ</button>
</div>
<div id="start" class="panel start">
  <h1>🐾 くまさん叩き</h1><div class="sub">つくる手帖 in 秋田市</div>
  <div class="lead">秋田市市街地の公園や小道に、くまさんたちが隠れています。木の後ろ、下水路、植え込み、石の陰から出てきたら、すばやくタップ！</div>
  <div class="cards"><div class="card">📍 秋田市<br>市街地</div><div class="card">⏱ 45秒</div><div class="card">🌳 隠れ場所<br>5か所</div></div>
  <button id="startBtn" class="bigbtn">ゲームスタート 🐾</button>
  <button id="backStart" class="subbtn">つくる手帖へ戻る</button>
  <div class="spots">千秋公園・広小路・仲小路・川反エリアをイメージ</div>
</div>
<div id="over" class="panel over hide">
  <h2>🐾 ゲーム終了 🐾</h2><p>今回のスコア</p><div class="scoreBig"><span id="finalScore">0</span><small style="font-size:24px">点</small></div>
  <div id="newBest" class="stamp hide">新記録！</div><div class="lead" style="text-align:center">ベストスコア：<b id="best">0</b>点<br>隠れていた場所をよく見つけました。</div>
  <button id="again" class="bigbtn disabled">もう一度遊ぶ</button><button id="backOver" class="subbtn">つくる手帖へ戻る</button>
</div>
<div id="pauseBox" class="panel pauseBox hide"><h2>一時停止</h2><div class="lead" style="text-align:center">少し休憩中です。</div><button id="resume" class="bigbtn">再開する</button><button id="backPause" class="subbtn">つくる手帖へ戻る</button></div>
<div id="hint" class="hint">コツ：穴だけではありません。木の後ろや下水路もよく見てください。</div>
</div>
<script>
(() => {
'use strict';
const PORTAL='https://tad551216-rgb.github.io/tsukuru-techo/';
const CACHE_KEY='tt_kuma_hide_best_v1';
const W=420,H=760,DURATION=45;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const timeEl=$('time'),scoreEl=$('score'),startPanel=$('start'),overPanel=$('over'),pauseBox=$('pauseBox'),hint=$('hint');
let dpr=1,state='title',score=0,timeLeft=DURATION,last=0,spawnT=0,active=[],hitFx=[],endAt=0;
const spots=[
 {id:'tree',name:'木の後ろ',x:104,y:324,w:78,h:96,kind:'side'},
 {id:'bush',name:'植え込み',x:276,y:352,w:92,h:72,kind:'up'},
 {id:'stone',name:'石の陰',x:96,y:578,w:84,h:62,kind:'up'},
 {id:'pipe',name:'下水路',x:216,y:562,w:86,h:66,kind:'up'},
 {id:'drain',name:'排水溝',x:330,y:552,w:84,h:64,kind:'up'}
];
function fit(){dpr=Math.min(devicePixelRatio||1,2.5);cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
fit();addEventListener('resize',fit);
document.addEventListener('gesturestart',e=>e.preventDefault());document.addEventListener('gesturechange',e=>e.preventDefault());document.addEventListener('dblclick',e=>e.preventDefault());
function rand(a,b){return a+Math.random()*(b-a)}
function startGame(){score=0;timeLeft=DURATION;active=[];hitFx=[];spawnT=.2;state='play';last=performance.now();scoreEl.textContent=score;timeEl.textContent=DURATION;startPanel.classList.add('hide');overPanel.classList.add('hide');pauseBox.classList.add('hide');hint.classList.remove('hide');requestAnimationFrame(loop)}
function endGame(){state='over';endAt=performance.now();$('finalScore').textContent=score;let best=+(localStorage.getItem(CACHE_KEY)||0);let nb=score>best;if(nb){best=score;localStorage.setItem(CACHE_KEY,best)}$('best').textContent=best;$('newBest').classList.toggle('hide',!nb);$('again').classList.add('disabled');overPanel.classList.remove('hide');setTimeout(()=>$('again').classList.remove('disabled'),1200)}
function spawn(){if(active.length>=3)return;let tries=0,sp;do{sp=spots[Math.floor(Math.random()*spots.length)];tries++}while(active.some(a=>a.spot.id===sp.id)&&tries<10);active.push({spot:sp,t:0,life:rand(.8,1.35),hit:false,phase:'rise',r:rand(.9,1.08)})}
function loop(now){if(state!=='play')return;let dt=(now-last)/1000;last=now;if(dt>.05)dt=.05;timeLeft-=dt;if(timeLeft<=0){timeLeft=0;timeEl.textContent='0';draw();endGame();return}timeEl.textContent=Math.ceil(timeLeft);spawnT-=dt;if(spawnT<=0){spawn();spawnT=rand(.45,.85)}for(const b of active)b.t+=dt;active=active.filter(b=>!b.hit && b.t<b.life);hitFx=hitFx.filter(f=>(f.t+=dt)<.45);draw();requestAnimationFrame(loop)}
function draw(){ctx.clearRect(0,0,W,H);bg();spotsDraw();for(const b of active)bear(b);for(const f of hitFx)fx(f);foreground();}
function bg(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#9ed5ff');g.addColorStop(.36,'#c9e9ff');g.addColorStop(.37,'#d9c7a7');g.addColorStop(1,'#8fb770');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);cloud(56,126,36);cloud(352,146,30);building(235,176,58,82);building(300,162,70,98);tower(232,100);statue(190,242);tree(66,120,86);tree(30,230,56);ctx.fillStyle='#b99d73';path();ctx.fillStyle='#75604b';ctx.fillRect(0,658,W,102);ctx.fillStyle='rgba(255,255,255,.08)';for(let i=0;i<20;i++){ctx.fillRect(i*24,668+(i%3)*14,18,3)}}
function cloud(x,y,s){ctx.fillStyle='rgba(255,255,255,.9)';for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x+i*s*.35,y+(i%2)*4,s*(.4+i*.05),0,7);ctx.fill()}}
function building(x,y,w,h){ctx.fillStyle='#e9eef0';ctx.fillRect(x,y,w,h);ctx.strokeStyle='#b8c5ca';ctx.strokeRect(x,y,w,h);ctx.fillStyle='#9dc0d2';for(let yy=y+14;yy<y+h-8;yy+=18)for(let xx=x+8;xx<x+w-8;xx+=18)ctx.fillRect(xx,yy,10,8)}
function tower(x,y){ctx.strokeStyle='#c54c35';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(x,y+112);ctx.lineTo(x+26,y);ctx.lineTo(x+52,y+112);ctx.stroke();ctx.lineWidth=3;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(x+8,y+20+i*18);ctx.lineTo(x+44,y+20+i*18);ctx.stroke()}}
function statue(x,y){ctx.fillStyle='#355d55';ctx.fillRect(x-6,y+40,38,48);ctx.beginPath();ctx.arc(x+13,y+20,13,0,7);ctx.fill();ctx.fillRect(x+6,y+30,16,35);ctx.fillStyle='#8a8174';ctx.fillRect(x-22,y+88,70,20)}
function tree(x,y,s){ctx.fillStyle='#6c4829';ctx.fillRect(x+s*.38,y+s*.28,s*.22,s*1.6);ctx.fillStyle='#57883f';for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(x+rand(0,s),y+rand(0,s*.8),rand(s*.18,s*.32),0,7);ctx.fill()}}
function path(){ctx.beginPath();ctx.moveTo(170,292);ctx.bezierCurveTo(118,418,70,514,24,660);ctx.lineTo(396,660);ctx.bezierCurveTo(342,510,302,420,246,292);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(100,75,45,.25)';for(let y=330;y<650;y+=35){ctx.beginPath();ctx.moveTo(110,y);ctx.lineTo(330,y+8);ctx.stroke()}}
function spotsDraw(){// tree trunk overlay base
ctx.fillStyle='#486f34';ctx.beginPath();ctx.ellipse(279,395,62,28,0,0,7);ctx.fill();ctx.fillStyle='#e07866';for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(236+i*13,376+Math.sin(i)*5,5,0,7);ctx.fill()}
// stone
ctx.fillStyle='#7e8074';ctx.beginPath();ctx.ellipse(96,603,72,28,0,0,7);ctx.fill();ctx.fillStyle='#a8aa9a';ctx.beginPath();ctx.ellipse(72,586,34,24,0,0,7);ctx.ellipse(121,590,42,25,0,0,7);ctx.fill();
// pipe
ctx.fillStyle='#4a4a42';ctx.beginPath();ctx.ellipse(216,592,45,28,0,0,7);ctx.fill();ctx.strokeStyle='#8f8a78';ctx.lineWidth=10;ctx.stroke();ctx.lineWidth=1;
// drain
ctx.fillStyle='#33342f';ctx.fillRect(294,565,92,44);ctx.strokeStyle='#99937d';ctx.lineWidth=8;ctx.strokeRect(294,565,92,44);ctx.lineWidth=5;ctx.strokeStyle='#6a6a61';for(let x=306;x<380;x+=17){ctx.beginPath();ctx.moveTo(x,568);ctx.lineTo(x-10,606);ctx.stroke()}ctx.lineWidth=1;
}
function foreground(){// overlay tree trunk so bears peek behind it
ctx.fillStyle='#6b4729';ctx.fillRect(68,152,42,365);ctx.fillStyle='rgba(40,25,10,.25)';ctx.fillRect(94,152,8,365);ctx.fillStyle='#795436';ctx.beginPath();ctx.ellipse(90,520,60,20,0,0,7);ctx.fill();
ctx.fillStyle='rgba(255,249,236,.92)';ctx.fillRect(18,92,230,54);ctx.strokeStyle='#e1cfae';ctx.strokeRect(18,92,230,54);ctx.fillStyle='#4b2f1c';ctx.font='bold 15px sans-serif';ctx.fillText('秋田市のまちで',34,116);ctx.fillText('かくれたくまさんを見つけよう！',34,138)}
function bear(b){const sp=b.spot;let p=Math.sin(Math.min(1,b.t/.18)*Math.PI/2);let down=Math.max(0,(b.t-b.life+.25)/.25);p*=1-down;let x=sp.x,y=sp.y;if(sp.kind==='side')x=sp.x-38+46*p;else y=sp.y+44-44*p;drawBear(x,y,b.r)}
function drawBear(x,y,s=1){ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle='#8b572f';ctx.beginPath();ctx.arc(-18,-18,13,0,7);ctx.arc(18,-18,13,0,7);ctx.arc(0,0,32,0,7);ctx.fill();ctx.fillStyle='#f4dcc0';ctx.beginPath();ctx.arc(0,8,16,0,7);ctx.fill();ctx.fillStyle='#2d1b10';ctx.beginPath();ctx.arc(-10,-4,3.5,0,7);ctx.arc(10,-4,3.5,0,7);ctx.arc(0,7,4,0,7);ctx.fill();ctx.strokeStyle='#2d1b10';ctx.lineWidth=2;ctx.beginPath();ctx.arc(-5,12,6,0,Math.PI);ctx.arc(5,12,6,0,Math.PI);ctx.stroke();ctx.restore()}
function fx(f){ctx.save();ctx.globalAlpha=1-f.t/.45;ctx.fillStyle='#f7c84b';ctx.font='900 26px sans-serif';ctx.fillText('+1',f.x-12,f.y-36);ctx.strokeStyle='#f7c84b';ctx.lineWidth=3;for(let i=0;i<8;i++){let a=i*Math.PI/4+f.t*8;ctx.beginPath();ctx.moveTo(f.x+Math.cos(a)*28,f.y+Math.sin(a)*28);ctx.lineTo(f.x+Math.cos(a)*42,f.y+Math.sin(a)*42);ctx.stroke()}ctx.restore()}
function tap(clientX,clientY){if(state!=='play')return;const r=cv.getBoundingClientRect();const x=(clientX-r.left)*W/r.width,y=(clientY-r.top)*H/r.height;let hit=false;for(let i=active.length-1;i>=0;i--){const b=active[i],sp=b.spot;let bx=sp.x,by=sp.y;if(sp.kind==='side')bx=sp.x-38+46*Math.sin(Math.min(1,b.t/.18)*Math.PI/2);else by=sp.y+44-44*Math.sin(Math.min(1,b.t/.18)*Math.PI/2);const dx=x-bx,dy=y-by;if(dx*dx+dy*dy<46*46){score++;scoreEl.textContent=score;b.hit=true;hitFx.push({x:bx,y:by,t:0});hit=true;break}}
if(!hit){score=Math.max(0,score-1);scoreEl.textContent=score;hitFx.push({x,y,t:.22})}}
cv.addEventListener('pointerdown',e=>{e.preventDefault();tap(e.clientX,e.clientY)},{passive:false});
$('startBtn').onclick=startGame;$('again').onclick=()=>{if(performance.now()-endAt>1100)startGame()};
$('pause').onclick=()=>{if(state==='play'){state='pause';pauseBox.classList.remove('hide')}};$('resume').onclick=()=>{if(state==='pause'){state='play';pauseBox.classList.add('hide');last=performance.now();requestAnimationFrame(loop)}};
['backStart','backOver','backPause'].forEach(id=>$(id).onclick=()=>{location.href=PORTAL});
draw();
if('serviceWorker' in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
})();
</script>
</body>
</html>
